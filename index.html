<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Page</title>
    <style>
        .page { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        button { padding: 10px 20px; background: blue; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <h1>这是第 1 页：Read Aloud</h1>
        <p>如果点击下面的按钮能跳到第 2 页，说明成功了！</p>
        <button onclick="document.getElementById('p1').style.display='none';document.getElementById('p2').style.display='block';">下一题</button>
    </div>

    <div id="p2" class="page">
        <h1>这是第 2 页：Repeat Sentence</h1>
        <p>🎉 看到这一页，说明你的浏览器“电路”通了！</p>
        <button onclick="location.reload()">重新开始</button>
    </div>

</body>
</html>
